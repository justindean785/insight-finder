<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swarmbot — OSINT Investigator</title>
    <meta name="description" content="Chat-driven OSINT investigator. Seed an identifier, get intel." />
    <meta name="author" content="Swarmbot" />

    <!-- Security headers (F-B5) — defense in depth alongside Supabase RLS + edge auth. -->
    <!-- Strict CSP: only same-origin + the Supabase + Google Fonts CDNs we use. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.serus.ai; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" />
    <!-- HSTS is set by Supabase / the host. Don't duplicate here. -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="canonical" href="https://insight-finder-sandy.vercel.app/" />

    <meta property="og:title" content="Swarmbot — OSINT Investigator" />
    <meta property="og:description" content="Chat-driven OSINT investigator. Seed an identifier, get intel." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://insight-finder-sandy.vercel.app/" />
    <meta property="og:image" content="https://insight-finder-sandy.vercel.app/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
