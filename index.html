    <!-- Security headers (F-B5) are delivered as real HTTP response headers via
         vercel.json — http-equiv <meta> is ignored by browsers for X-Frame-Options,
         X-Content-Type-Options and Permissions-Policy, so they must be headers.
         CSP + Referrer-Policy live there too so the policy is defined in one place.
         HSTS is set by Supabase / the host. -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
