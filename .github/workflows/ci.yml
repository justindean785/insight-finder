name: CI

# Gate every PR (and pushes to main) on lint + typecheck + unit tests + build,
# plus the Deno edge-function test suite. Until now nothing ran automatically,
# so type regressions (e.g. a frontend `tsc` error that `vite build` does not
# catch) could reach the Lovable auto-deploy unnoticed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # .npmrc sets legacy-peer-deps=true (react-leaflet@5 peer mismatch).
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  edge:
    name: Edge function (Deno tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Edge tests
        run: npm run test:edge
