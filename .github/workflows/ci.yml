name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests + coverage
        run: npm run test:coverage
      - name: Production build
        run: npm run build
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

  migrations:
    name: Migrations (psql validation)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      # The shim stubs the objects Supabase provisions outside this repo
      # (anon/authenticated/service_role roles, auth.*, storage.*, the
      # supabase_realtime publication) so the real migrations can run.
      - name: Apply Supabase platform shim
        run: psql --set ON_ERROR_STOP=1 --quiet -f .github/ci/supabase-platform-shim.sql
      - name: Apply migrations in timestamp order
        run: |
          set -euo pipefail
          # Sort by the timestamp prefix (the part before the first
          # underscore), matching how the Supabase CLI orders migrations —
          # plain byte order would misplace e.g. 20260608115117_* vs
          # 20260608_*.
          count=0
          while IFS= read -r f; do
            echo "==> ${f}"
            psql --set ON_ERROR_STOP=1 --quiet -f "${f}"
            count=$((count + 1))
          done < <(printf '%s\n' supabase/migrations/*.sql | LC_ALL=C sort -t_ -k1,1)
          echo "Applied ${count} migrations cleanly."
      # Runtime proof (not just DDL): invoke record_artifacts_with_evidence +
      # append_evidence for real and assert every stored content_hash is
      # byte-for-byte canonical-recomputable from its columns, the two writers
      # share one valid verify_evidence_chain chain, and dedup/retry are idempotent.
      - name: Evidence content-hash + chain compatibility regression
        run: psql --set ON_ERROR_STOP=1 --quiet -f .github/ci/content-hash-compat-test.sql
      # Findings #9/#10: confidence bounds (valid/negative/above-max/NaN/Infinity/
      # empty, no partial writes) + dedup enforced at the DB level, including the
      # direct-insert bypass path the audit flagged and legitimate distinct-source
      # observations NOT being collapsed.
      - name: Artifacts confidence-bounds + dedup regression
        run: psql --set ON_ERROR_STOP=1 --quiet -f .github/ci/artifacts-integrity-test.sql
      # Genuine CONCURRENT duplicate-insert race (two real overlapping sessions,
      # not sequential calls) — proves the unique index, not just app-level logic.
      - name: Concurrent duplicate-insert regression
        run: bash .github/ci/concurrent-dedup-test.sh
      # Re-apply the newest migration a second time — proves it's idempotent, and
      # that a re-run doesn't disturb the working hash-chain.
      - name: Migration idempotency (re-run newest migration)
        run: |
          psql --set ON_ERROR_STOP=1 --quiet -f supabase/migrations/20260711130000_artifacts_confidence_bounds_and_dedup.sql
          psql --set ON_ERROR_STOP=1 --quiet -f .github/ci/content-hash-compat-test.sql

  edge:
    name: Edge functions (deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The edge tests resolve npm: specifiers against node_modules via the
      # import map in deno.json, so dependencies must be installed first.
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Scoped TYPE-CHECK (not just transpilation) on the pure, import-free
      # integrity modules. Deliberately limited to leaf modules so it catches type
      # errors in new code WITHOUT pulling in the ~12-157 pre-existing AI-SDK/
      # Supabase type-graph errors that a whole-project `deno check` would surface.
      - name: Deno type-check (scoped, new pure modules)
        run: cd supabase/functions/osint-agent && deno check anchor-parse.ts output-integrity.ts
      - name: Deno edge tests
        run: npm run test:edge
